<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Календарь Привычек</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;--bg4:#252532;
--border:#2e2e3e;--text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;
--accent:#7c6af7;--accent2:#5e4fd6;--glow:rgba(124,106,247,.25);
--green:#3ecf8e;--red:#f75f6b;--yellow:#f7c94f;
--r:14px;--rs:8px;--shadow:0 4px 24px rgba(0,0,0,.5);--tr:.18s ease;
}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;min-height:100vh}

header{
height:54px;display:flex;align-items:center;justify-content:space-between;
padding:0 22px;background:var(--bg2);border-bottom:1px solid var(--border);
position:sticky;top:0;z-index:100;gap:12px;flex-shrink:0
}
.logo{font-size:1.15rem;font-weight:700;display:flex;align-items:center;gap:8px;white-space:nowrap}
.logo span{color:var(--accent)}
.menu-toggle{display:none;background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer;padding:4px}

.main-content{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{
width:290px;min-width:270px;background:var(--bg2);border-right:1px solid var(--border);
display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;
transition:transform var(--tr)
}
.sb-section{padding:16px 15px 14px;border-bottom:1px solid var(--border)}
.sb-title{font-size:.69rem;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);margin-bottom:11px}

/* quick stats — vertical stack */
.qs-list{display:flex;flex-direction:column;gap:7px}
.qs-card{
background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);
padding:11px 12px 10px;display:flex;align-items:center;gap:11px;position:relative
}
.qs-icon{
font-size:1.3rem;width:34px;height:34px;border-radius:8px;
background:var(--bg4);display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.qs-body{flex:1;min-width:0}
.qs-num{font-size:1.25rem;font-weight:700;line-height:1}
.qs-label{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;line-height:1.3}

/* ? button — bottom-right of card */
.tip-btn{
position:absolute;bottom:6px;right:6px;
width:15px;height:15px;border-radius:50%;
background:var(--bg4);border:1px solid var(--border);
color:var(--text3);font-size:.58rem;font-weight:700;
display:flex;align-items:center;justify-content:center;
cursor:pointer;transition:all var(--tr);z-index:2;line-height:1
}
.tip-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}

/* tooltip bubble — drops DOWN, full card width */
.tip-bubble{
position:absolute;top:calc(100% + 7px);left:0;right:0;
background:var(--bg4);border:1px solid var(--accent);border-radius:var(--rs);
padding:9px 11px;font-size:.73rem;color:var(--text2);line-height:1.55;
box-shadow:var(--shadow);z-index:600;pointer-events:none;
}
.tip-bubble::before{
content:'';position:absolute;bottom:100%;right:16px;
border:5px solid transparent;border-bottom-color:var(--accent)
}
.tip-bubble.hidden{display:none}

/* stats link button (mobile entry point) */
.stats-link-btn{
display:flex;align-items:center;gap:8px;width:100%;margin-top:10px;
padding:9px 12px;border-radius:var(--rs);background:var(--bg4);
border:1px solid var(--border);color:var(--text2);
font-size:.82rem;font-weight:500;cursor:pointer;transition:all var(--tr)
}
.stats-link-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--glow)}

/* habit items */
.habit-item{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:var(--rs);transition:background var(--tr)}
.habit-item:hover{background:var(--bg3)}
.habit-dot{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.habit-info{flex:1;min-width:0}
.habit-name{font-size:.86rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.habit-goal-tag{
display:inline-flex;align-items:center;gap:3px;
background:var(--bg4);border:1px solid var(--border);border-radius:20px;
padding:2px 7px;font-size:.66rem;color:var(--text2);margin-top:3px
}
.habit-actions{display:flex;gap:2px;opacity:0;transition:opacity var(--tr);flex-shrink:0}
.habit-item:hover .habit-actions{opacity:1}

/* filter */
.filter-section{padding:11px 15px 12px;border-bottom:1px solid var(--border)}
.filter-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.filter-title{font-size:.69rem;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--text3)}
.filter-all-btn{font-size:.69rem;color:var(--accent);cursor:pointer;background:none;border:none;padding:0;text-decoration:underline;text-underline-offset:2px}
.filter-chips{display:flex;flex-wrap:wrap;gap:5px}
.filter-chip{
display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:20px;
font-size:.72rem;font-weight:500;cursor:pointer;border:1.5px solid transparent;
transition:all var(--tr);user-select:none
}
.filter-chip.on{opacity:1;border-color:currentColor}
.filter-chip.off{opacity:.28;filter:grayscale(.9)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);border:none;cursor:pointer;font-size:.84rem;font-weight:500;transition:all var(--tr);white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);box-shadow:0 0 14px var(--glow)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg4)}
.btn-ghost{background:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:rgba(247,95,107,.12);color:var(--red);border:1px solid rgba(247,95,107,.22)}
.btn-danger:hover{background:rgba(247,95,107,.22)}
.btn-sm{padding:5px 11px;font-size:.77rem}
.btn-full{width:100%;justify-content:center}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:4px 5px;border-radius:5px;font-size:.84rem;transition:background var(--tr),color var(--tr);display:flex;align-items:center}
.icon-btn:hover{background:var(--bg4);color:var(--text)}
.icon-btn.danger:hover{background:rgba(247,95,107,.15);color:var(--red)}

/* today button */
.today-btn{
padding:5px 12px;border-radius:var(--rs);
border:1.5px solid var(--accent);background:var(--glow);
color:var(--accent);font-size:.8rem;font-weight:600;
cursor:pointer;transition:all var(--tr);white-space:nowrap
}
.today-btn:hover{background:var(--accent);color:#fff;box-shadow:0 0 10px var(--glow)}

/* ── TABS ── */
.tab-switcher{display:flex;background:var(--bg3);border-radius:var(--rs);padding:3px;gap:2px}
.tab-btn{padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:.81rem;font-weight:500;transition:all var(--tr);white-space:nowrap}
.tab-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px var(--glow)}

/* ── MAIN / CALENDAR ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* mobile view-switcher strip (hidden on desktop) */
.mobile-view-strip{display:none;padding:10px 14px 0;background:var(--bg)}
.mobile-view-strip .tab-switcher{width:100%}
.mobile-view-strip .tab-btn{flex:1;text-align:center}

/* calendar toolbar */
.cal-toolbar{
display:flex;align-items:center;gap:8px;
padding:12px 22px;background:var(--bg2);border-bottom:1px solid var(--border);
flex-shrink:0;flex-wrap:wrap
}
.cal-nav{display:flex;align-items:center;gap:7px}
.cal-title{font-size:1rem;font-weight:600;min-width:178px;text-align:center}
.nav-btn{
width:30px;height:30px;border-radius:7px;border:1px solid var(--border);
background:var(--bg3);color:var(--text);cursor:pointer;
display:flex;align-items:center;justify-content:center;font-size:1rem;
transition:all var(--tr)
}
.nav-btn:hover{background:var(--bg4);border-color:var(--accent);color:var(--accent)}

#calendar-body{flex:1;overflow-y:auto;padding:18px 22px}

/* ── MONTH ── */
.month-grid{display:flex;flex-direction:column;gap:4px}
.month-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:2px}
.dow-label{text-align:center;font-size:.67rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:4px 0}
.month-weeks{display:flex;flex-direction:column;gap:4px}
.month-week{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{
min-height:82px;background:var(--bg2);border:1px solid var(--border);
border-radius:var(--rs);padding:6px;cursor:pointer;
transition:border-color var(--tr),background var(--tr),box-shadow var(--tr);
display:flex;flex-direction:column;gap:3px;overflow:hidden
}
.cal-day:hover{border-color:var(--accent);background:var(--bg3)}
.cal-day.today{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent),0 0 10px var(--glow)}
.cal-day.today .day-num{color:#fff;background:var(--accent);border-radius:5px;padding:1px 5px;font-weight:700}
.cal-day.other-month{opacity:.3}
.cal-day.has-habits{background:var(--bg3)}
.day-num{font-size:.73rem;font-weight:500;color:var(--text2);line-height:1;align-self:flex-start}
.day-habits{display:flex;flex-wrap:wrap;gap:2px;flex:1;align-content:flex-start}
.day-habit-badge{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.74rem;flex-shrink:0;transition:transform var(--tr)}
.day-habit-badge:hover{transform:scale(1.2);z-index:2}
.day-more{font-size:.61rem;color:var(--text3);align-self:flex-end}

/* ── WEEK ── */
.week-grid{display:flex;flex-direction:column;gap:8px}
.week-day-row{display:grid;grid-template-columns:84px 1fr;gap:12px;align-items:start}
.week-day-label{text-align:right;padding-top:10px}
.week-day-name{font-size:.73rem;font-weight:600;text-transform:uppercase;color:var(--text3);letter-spacing:.05em}
.week-day-date{font-size:1.32rem;font-weight:700;color:var(--text);line-height:1.1}
.week-day-date.today-num{color:#fff;background:var(--accent);border-radius:8px;padding:2px 8px;display:inline-block}
.week-day-content{
background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);
padding:10px 12px;min-height:56px;cursor:pointer;
transition:border-color var(--tr),background var(--tr);
display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start
}
.week-day-content:hover{border-color:var(--accent);background:var(--bg3)}
.week-day-content.today-row{border-color:var(--accent);box-shadow:0 0 8px var(--glow)}
.week-habit-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;font-size:.76rem;font-weight:500;white-space:nowrap}

/* ── YEAR ── */
.year-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(236px,1fr));gap:14px}
.year-month-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px}
.year-month-title{font-size:.77rem;font-weight:600;color:var(--text2);margin-bottom:9px;text-transform:uppercase;letter-spacing:.06em}
.mini-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.mini-dow{font-size:.56rem;text-align:center;color:var(--text3);font-weight:600;padding-bottom:2px}
.mini-day{
aspect-ratio:1;border-radius:4px;background:var(--bg3);
display:flex;align-items:center;justify-content:center;
font-size:.56rem;color:var(--text3);cursor:pointer;
transition:all var(--tr);position:relative;overflow:visible
}
.mini-day:hover{border:1px solid var(--accent);z-index:2}
.mini-day.today-mini{border:1.5px solid var(--accent)!important;color:var(--accent);font-weight:700}
.mini-day.empty{background:transparent;cursor:default;pointer-events:none}
.mini-day.has-habits{background:var(--bg4)}
.mini-day-num{position:absolute;top:1px;left:2px;font-size:.48rem;color:var(--text3);line-height:1;z-index:1}
.mini-emojis{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;width:100%;height:100%;padding-top:3px}
.mini-emoji{font-size:.66rem;line-height:1;margin:-1px}

/* ── STATS PANEL desktop ── */
#stats-panel{width:300px;min-width:278px;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;flex-shrink:0}
.stats-hdr{padding:15px 16px 13px;border-bottom:1px solid var(--border);font-size:.9rem;font-weight:600}
.stats-body-inner{padding:13px 15px;display:flex;flex-direction:column;gap:13px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:13px}
.stat-card-title{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:10px}
.stat-habit-item{margin-bottom:10px}
.stat-habit-item:last-child{margin-bottom:0}
.stat-habit-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.stat-habit-name{display:flex;align-items:center;gap:6px;font-size:.8rem;font-weight:500}
.stat-habit-count{font-size:.75rem;color:var(--text2)}
.pb-wrap{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.pb-fill{height:100%;border-radius:3px;transition:width .4s ease;background:var(--accent)}
.pb-fill.g{background:var(--green)}.pb-fill.y{background:var(--yellow)}.pb-fill.r{background:var(--red)}
.stat-pct{font-size:.66rem;color:var(--text3);margin-top:3px;text-align:right}
.streak-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(247,201,79,.1);border:1px solid rgba(247,201,79,.25);color:var(--yellow);padding:2px 6px;border-radius:20px;font-size:.68rem;font-weight:600}
.streak-legend{margin-top:9px;background:var(--bg4);border-radius:var(--rs);padding:9px 11px;font-size:.71rem;color:var(--text2);line-height:1.55;border:1px solid var(--border)}
.streak-legend strong{color:var(--text)}
.heatmap-wrap{overflow-x:auto;padding-bottom:4px}
.heatmap-grid{display:flex;gap:3px}
.heatmap-col{display:flex;flex-direction:column;gap:3px}
.hm-cell{width:11px;height:11px;border-radius:2px;background:var(--bg4);transition:transform var(--tr);cursor:default}
.hm-cell:hover{transform:scale(1.5);z-index:1}
.hm-cell.lv1{background:rgba(124,106,247,.28)}.hm-cell.lv2{background:rgba(124,106,247,.52)}
.hm-cell.lv3{background:rgba(124,106,247,.76)}.hm-cell.lv4{background:var(--accent)}

/* ── STATS SCREEN mobile ── */
#stats-screen{
display:none;position:fixed;inset:0;background:var(--bg);
z-index:400;flex-direction:column;overflow:hidden
}
#stats-screen.open{display:flex}
.ss-header{
display:flex;align-items:center;gap:12px;padding:14px 18px;
background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0
}
.ss-back{
display:flex;align-items:center;gap:5px;background:none;border:none;
color:var(--accent);font-size:.9rem;font-weight:600;cursor:pointer;padding:4px 0
}
.ss-title{font-size:1rem;font-weight:700}
.ss-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:13px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s ease}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:24px;width:100%;max-width:460px;box-shadow:var(--shadow);transform:translateY(20px);transition:transform .2s ease;max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
.form-group{margin-bottom:15px}
.form-label{display:block;font-size:.73rem;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;color:var(--text);font-size:.87rem;outline:none;transition:border-color var(--tr);font-family:inherit}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.form-select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;color:var(--text);font-size:.87rem;outline:none;cursor:pointer;font-family:inherit;transition:border-color var(--tr)}
.form-select:focus{border-color:var(--accent)}
.emoji-grid{display:flex;flex-wrap:wrap;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:7px;max-height:145px;overflow-y:auto;flex:1}
.emoji-option{width:32px;height:32px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:1.15rem;display:flex;align-items:center;justify-content:center;transition:background var(--tr)}
.emoji-option:hover{background:var(--bg4)}.emoji-option.selected{background:var(--accent)}
.emoji-preview{width:44px;height:44px;border-radius:var(--rs);background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.emoji-picker-row{display:flex;gap:8px;align-items:flex-start}
.color-row{display:flex;gap:7px;flex-wrap:wrap}
.color-option{width:26px;height:26px;border-radius:7px;cursor:pointer;border:2px solid transparent;transition:all var(--tr)}
.color-option:hover{transform:scale(1.15)}.color-option.selected{border-color:#fff;box-shadow:0 0 0 2px var(--accent)}
.goal-inline{display:flex;align-items:center;gap:8px}
.goal-inline .form-input{width:70px}
.day-habit-list{display:flex;flex-direction:column;gap:7px}
.day-toggle{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:var(--rs);border:1px solid var(--border);cursor:pointer;transition:all var(--tr);background:var(--bg3);user-select:none}
.day-toggle:hover{border-color:var(--accent)}.day-toggle.checked{background:var(--bg4);border-color:transparent}
.tog-emoji{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.tog-name{flex:1;font-size:.86rem;font-weight:500}
.tog-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.8rem;color:transparent;transition:all var(--tr);flex-shrink:0}
.day-toggle.checked .tog-check{background:var(--green);border-color:var(--green);color:#fff}

/* ── TOAST ── */
#toast-wrap{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:var(--bg4);border:1px solid var(--border);border-radius:var(--rs);padding:9px 14px;font-size:.8rem;color:var(--text);box-shadow:var(--shadow);animation:tIn .22s ease forwards;pointer-events:all;max-width:265px;display:flex;align-items:center;gap:7px}
.toast.success{border-left:3px solid var(--green)}.toast.error{border-left:3px solid var(--red)}.toast.info{border-left:3px solid var(--accent)}
@keyframes tIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(8px)}}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:30px 14px;color:var(--text3);text-align:center}
.empty-state-icon{font-size:2.4rem}.empty-state-title{font-size:.88rem;font-weight:600;color:var(--text2)}.empty-state-desc{font-size:.77rem;line-height:1.5;max-width:215px}
.confirm-text{font-size:.86rem;color:var(--text2);line-height:1.55;margin-bottom:6px}

/* ── RESPONSIVE ── */
@media(max-width:1100px){#stats-panel{display:none!important}}
@media(max-width:768px){
#sidebar{position:fixed;left:0;top:0;bottom:0;z-index:200;transform:translateX(-100%)}
#sidebar.open{transform:translateX(0);box-shadow:var(--shadow)}
.menu-toggle{display:flex!important}
.desktop-view-switcher{display:none!important}
.mobile-view-strip{display:block}
.cal-toolbar{padding:10px 14px;background:var(--bg);border-bottom:none;border-top:1px solid var(--border)}
.cal-title{font-size:.9rem;min-width:128px}
#calendar-body{padding:10px 12px}
.cal-day{min-height:56px}
.week-day-row{grid-template-columns:54px 1fr}
.year-grid{grid-template-columns:repeat(2,1fr)}
.stats-link-btn{display:flex}
}
@media(min-width:769px){
.stats-link-btn{display:none}
#stats-panel{display:flex}
}
@media(max-width:480px){
.cal-day{min-height:46px;padding:4px}
.day-habit-badge{width:18px;height:18px;font-size:.63rem}
.year-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<header>
<div style="display:flex;align-items:center;gap:10px">
<button class="menu-toggle" id="menuToggle">☰</button>
<div class="logo">🌿 <span>Habits</span></div>
</div>
<!-- Desktop view switcher in header -->
<div class="desktop-view-switcher">
<div class="tab-switcher" id="vswDesktop">
<button class="tab-btn" data-view="week">Неделя</button>
<button class="tab-btn active" data-view="month">Месяц</button>
<button class="tab-btn" data-view="year">Год</button>
</div>
</div>
<div style="width:120px"></div><!-- spacer to center switcher -->
</header>

<div class="main-content">

<!-- SIDEBAR -->
<aside id="sidebar">
<!-- Quick Stats -->
<div class="sb-section">
<div class="sb-title">Быстрая статистика</div>
<div class="qs-list" id="qsList"></div>
<button class="stats-link-btn" id="mobileStatsBtn">📊 Подробная статистика →</button>
</div>

<!-- Habits -->
<div class="sb-section">
<div class="sb-title">Мои привычки</div>
<div id="habitsList"></div>
<button class="btn btn-primary btn-full btn-sm" id="addHabitBtn" style="margin-top:10px">+ Добавить привычку</button>
</div>

<!-- Filter -->
<div class="filter-section" id="filterSection" style="display:none">
<div class="filter-header">
<div class="filter-title">Фильтр календаря</div>
<button class="filter-all-btn" id="filterAllBtn">Все</button>
</div>
<div class="filter-chips" id="filterChips"></div>
</div>

<!-- Clear -->
<div class="sb-section" style="margin-top:auto">
<button class="btn btn-danger btn-full btn-sm" id="clearDataBtn">🗑 Очистить все данные</button>
</div>
</aside>

<!-- MAIN -->
<main id="main">
<!-- Mobile view switcher (above toolbar, outside header) -->
<div class="mobile-view-strip">
<div class="tab-switcher" id="vswMobile">
<button class="tab-btn" data-view="week">Неделя</button>
<button class="tab-btn active" data-view="month">Месяц</button>
<button class="tab-btn" data-view="year">Год</button>
</div>
</div>

<!-- Calendar toolbar -->
<div class="cal-toolbar">
<div class="cal-nav">
<button class="nav-btn" id="prevBtn">‹</button>
<div class="cal-title" id="calTitle"></div>
<button class="nav-btn" id="nextBtn">›</button>
<button class="today-btn" id="todayBtn">Сегодня</button>
</div>
</div>

<div id="calendar-body"></div>
</main>

<!-- STATS PANEL desktop -->
<aside id="stats-panel">
<div class="stats-hdr">📊 Статистика</div>
<div class="stats-body-inner" id="statsPanelBody"></div>
</aside>

</div><!-- /.main-content -->
</div><!-- /#app -->

<!-- STATS SCREEN mobile -->
<div id="stats-screen">
<div class="ss-header">
<button class="ss-back" id="statsBackBtn">‹ Назад</button>
<div class="ss-title">📊 Статистика</div>
</div>
<div class="ss-body" id="statsScreenBody"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
<div class="modal" id="modalBox"></div>
</div>

<!-- TOAST -->
<div id="toast-wrap"></div>

<!-- Sidebar backdrop -->
<div id="sbBackdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199"></div>

<script>
/* ============================================================
STORAGE
============================================================ */
const SK = 'habitcal_v3';
function loadState(){try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r)}catch(e){}return{habits:[],completions:{},createdAt:Date.now()}}
function saveState(){try{localStorage.setItem(SK,JSON.stringify(state))}catch(e){}}
let state=loadState();
if(!state.habits)state.habits=[];
if(!state.completions)state.completions={};

/* ============================================================
CONSTANTS
============================================================ */
const EMOJIS=['🏃','🏋️','🧘','🚴','🏊','🧗','⚽','🏀','🎾','🥊','📚','✍️','🎨','🎵','🎮','💻','🗣️','🧠','📝','🔬','🥗','🥤','💊','🌿','🍎','😴','🛁','🧹','💰','🌅','❤️','🤝','📞','🎯','🔥','⭐','💡','🌍','🙏','😊'];
const COLORS=['#7c6af7','#3ecf8e','#f75f6b','#f7c94f','#4fc3f7','#ff8a65','#ce93d8','#80cbc4','#a5d6a7','#ef9a9a','#90caf9','#ffe082','#4dd0e1','#f48fb1','#bcaaa4'];
const DOW=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MGEN=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const GL={week:'в нед.',month:'в мес.',year:'в год'};

/* ============================================================
VIEW STATE
============================================================ */
let currentView='month';
let currentDate=new Date();
let activeFilters=null;

/* ============================================================
HELPERS
============================================================ */
function dkd(dt){return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`}
function todayKey(){return dkd(new Date())}
function isToday(dt){return dkd(dt)===todayKey()}
function getDone(hid,key){return!!(state.completions[key]&&state.completions[key][hid])}
function toggleDone(hid,key){
if(!state.completions[key])state.completions[key]={};
if(state.completions[key][hid])delete state.completions[key][hid];
else state.completions[key][hid]=true;
if(!Object.keys(state.completions[key]).length)delete state.completions[key];
saveState();
}
function dayDone(key){return Object.keys(state.completions[key]||{}).filter(id=>state.completions[key][id])}
function visHabits(){return activeFilters?state.habits.filter(h=>activeFilters.has(h.id)):state.habits}
function filtDone(key){const done=dayDone(key);return visHabits().filter(h=>done.includes(h.id))}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function weekStart(d){
const dt=new Date(d);
const dow=(dt.getDay()+6)%7;
dt.setDate(dt.getDate()-dow);dt.setHours(0,0,0,0);return dt;
}

/* ============================================================
STREAKS
============================================================ */
function calcStreak(hid){
const today=new Date();today.setHours(0,0,0,0);
let cur=0;
let d=new Date(today);
while(true){
const k=dkd(d);
if(state.completions[k]&&state.completions[k][hid]){cur++;d.setDate(d.getDate()-1)}
else break;
}
const keys=Object.keys(state.completions).filter(k=>state.completions[k][hid]).sort();
if(!keys.length)return{current:0,max:0};
let mx=0,cs=0,prev=null;
for(const k of keys){
if(!prev){cs=1}
else{const pd=new Date(prev);pd.setDate(pd.getDate()+1);cs=dkd(pd)===k?cs+1:1}
if(cs>mx)mx=cs;prev=k;
}
return{current:cur,max:mx};
}

/* ============================================================
STATS HELPERS
============================================================ */
function periodStats(hid,type,ref){
let start,end;
const d=new Date(ref);
if(type==='week'){
const dow=(d.getDay()+6)%7;
start=new Date(d);start.setDate(d.getDate()-dow);start.setHours(0,0,0,0);
end=new Date(start);end.setDate(start.getDate()+6);end.setHours(23,59,59,999);
}else if(type==='month'){
start=new Date(d.getFullYear(),d.getMonth(),1);
end=new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59);
}else{
start=new Date(d.getFullYear(),0,1);
end=new Date(d.getFullYear(),11,31,23,59,59);
}
let n=0;const c=new Date(start);
while(c<=end){const k=dkd(c);if(state.completions[k]&&state.completions[k][hid])n++;c.setDate(c.getDate()+1)}
return n;
}

function goalForPeriod(h,type){
if(!h.goal)return null;
const g=h.goal;
if(g.type===type)return g.value;
if(g.type==='week'){if(type==='month')return Math.round(g.value*4.33);if(type==='year')return Math.round(g.value*52)}
if(g.type==='month'){if(type==='week')return Math.round(g.value/4.33);if(type==='year')return g.value*12}
if(g.type==='year'){if(type==='week')return Math.round(g.value/52);if(type==='month')return Math.round(g.value/12)}
return null;
}

function lastWeekPct(){
const today=new Date();today.setHours(0,0,0,0);
const mon=new Date(today);
mon.setDate(today.getDate()-(today.getDay()+6)%7-7);
const ref=new Date(mon);ref.setDate(mon.getDate()+1);
const wg=state.habits.filter(h=>h.goal);
if(!wg.length)return null;
let tot=0;
wg.forEach(h=>{const done=periodStats(h.id,'week',ref);const goal=goalForPeriod(h,'week');if(goal)tot+=Math.min(100,Math.round(done/goal*100))});
return Math.round(tot/wg.length);
}

function allTimeTotal(){
let n=0;Object.values(state.completions).forEach(day=>n+=Object.values(day).filter(Boolean).length);return n;
}

/* ============================================================
RENDER
============================================================ */
function render(){
renderQS();
renderHabits();
renderFilter();
renderCalendar();
renderStatsPanel();
}

/* ---- QUICK STATS ---- */
const QS_DATA=[
{icon:'🎯',label:'Привычки',tip:'Количество активных привычек, которые вы сейчас отслеживаете.'},
{icon:'✅',label:'Выполнений за всё время',tip:'Суммарное количество отметок выполнения по всем привычкам за всё время.'},
{icon:'📈',label:'Успех прошлой недели',tip:'Средний процент выполнения целей за прошлую неделю. Учитываются только привычки с заданными целями. Если целей нет — отображается «—».'},
];

function renderQS(){
const list=document.getElementById('qsList');
const vals=[state.habits.length,allTimeTotal(),(()=>{const p=lastWeekPct();return p!==null?p+'%':'—'})()];
list.innerHTML=QS_DATA.map((d,i)=>`
<div class="qs-card" style="position:relative">
<div class="qs-icon">${d.icon}</div>
<div class="qs-body">
<div class="qs-num">${vals[i]}</div>
<div class="qs-label">${d.label}</div>
</div>
<button class="tip-btn" data-tip="${i}">?</button>
<div class="tip-bubble hidden" id="tip${i}">${d.tip}</div>
</div>`).join('');

list.querySelectorAll('.tip-btn').forEach(btn=>{
btn.addEventListener('click',e=>{
e.stopPropagation();
const id=btn.dataset.tip;
const b=document.getElementById('tip'+id);
const wasHidden=b.classList.contains('hidden');
list.querySelectorAll('.tip-bubble').forEach(x=>x.classList.add('hidden'));
if(wasHidden)b.classList.remove('hidden');
});
});
}

/* close tips on outside click */
document.addEventListener('click',()=>document.querySelectorAll('.tip-bubble').forEach(b=>b.classList.add('hidden')));

/* ---- HABITS LIST ---- */
function renderHabits(){
const el=document.getElementById('habitsList');
if(!state.habits.length){
el.innerHTML=`<div class="empty-state" style="padding:16px 0 4px">
<div class="empty-state-icon">🌱</div>
<div class="empty-state-title">Нет привычек</div>
<div class="empty-state-desc">Добавьте первую привычку, чтобы начать отслеживать прогресс</div>
</div>`;return;
}
el.innerHTML=state.habits.map(h=>`
<div class="habit-item">
<div class="habit-dot" style="background:${h.color}22;border:1px solid ${h.color}44">${h.emoji}</div>
<div class="habit-info">
<div class="habit-name">${esc(h.name)}</div>
${h.goal?`<div class="habit-goal-tag">🎯 ${h.goal.value} ${GL[h.goal.type]}</div>`:''}
</div>
<div class="habit-actions">
<button class="icon-btn" data-action="edit" data-id="${h.id}" title="Редактировать">✏️</button>
<button class="icon-btn danger" data-action="delete" data-id="${h.id}" title="Удалить">🗑</button>
</div>
</div>`).join('');
}

/* ---- FILTER ---- */
function renderFilter(){
const sec=document.getElementById('filterSection');
if(!state.habits.length){sec.style.display='none';return}
sec.style.display='block';
document.getElementById('filterChips').innerHTML=state.habits.map(h=>{
const on=!activeFilters||activeFilters.has(h.id);
return`<div class="filter-chip ${on?'on':'off'}" data-fid="${h.id}" style="background:${h.color}18;color:${h.color}">${h.emoji} ${esc(h.name)}</div>`;
}).join('');
}

/* ---- CALENDAR ---- */
function calTitle(){
if(currentView==='month')return`${MONTHS[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
if(currentView==='year')return`${currentDate.getFullYear()}`;
const s=weekStart(currentDate);const e=new Date(s);e.setDate(s.getDate()+6);
return`${s.getDate()} ${MGEN[s.getMonth()]} — ${e.getDate()} ${MGEN[e.getMonth()]}`;
}

function renderCalendar(){
document.getElementById('calTitle').textContent=calTitle();
const body=document.getElementById('calendar-body');
if(currentView==='month')body.innerHTML=renderMonth();
else if(currentView==='week')body.innerHTML=renderWeek();
else body.innerHTML=renderYear();
attachCalEvents();
}

/* MONTH */
function renderMonth(){
const y=currentDate.getFullYear(),m=currentDate.getMonth();
const first=new Date(y,m,1),last=new Date(y,m+1,0);
const sdow=(first.getDay()+6)%7;
const cells=[];
for(let i=0;i<sdow;i++)cells.push({date:new Date(y,m,1-sdow+i),other:true});
for(let d=1;d<=last.getDate();d++)cells.push({date:new Date(y,m,d),other:false});
while(cells.length%7!==0)cells.push({date:new Date(y,m+1,cells.length-last.getDate()-sdow+1),other:true});
const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));

let h=`<div class="month-grid">
<div class="month-dow-row">${DOW.map(d=>`<div class="dow-label">${d}</div>`).join('')}</div>
<div class="month-weeks">`;
for(const wk of weeks){
h+=`<div class="month-week">`;
for(const c of wk){
const key=dkd(c.date);
const done=filtDone(key);
const isT=isToday(c.date);
const cls=['cal-day',c.other?'other-month':'',isT?'today':'',done.length?'has-habits':''].filter(Boolean).join(' ');
const MAX=5;const shown=done.slice(0,MAX);const extra=done.length-MAX;
h+=`<div class="${cls}" data-day="${c.date.getTime()}">
<div class="day-num">${c.date.getDate()}</div>
<div class="day-habits">
${shown.map(hb=>`<div class="day-habit-badge" style="background:${hb.color}33" title="${esc(hb.name)}">${hb.emoji}</div>`).join('')}
${extra>0?`<div class="day-more">+${extra}</div>`:''}
</div>
</div>`;
}
h+=`</div>`;
}
h+=`</div></div>`;return h;
}

/* WEEK */
function renderWeek(){
const s=weekStart(currentDate);
let h=`<div class="week-grid">`;
for(let i=0;i<7;i++){
const d=new Date(s);d.setDate(s.getDate()+i);
const key=dkd(d);const done=filtDone(key);const isT=isToday(d);
h+=`<div class="week-day-row">
<div class="week-day-label">
<div class="week-day-name">${DOW[i]}</div>
<div class="week-day-date ${isT?'today-num':''}">${d.getDate()}</div>
</div>
<div class="week-day-content ${isT?'today-row':''}" data-day="${d.getTime()}">
${done.length===0
?`<span style="color:var(--text3);font-size:.75rem;align-self:center">Нет выполненных</span>`
:done.map(hb=>`<div class="week-habit-chip" style="background:${hb.color}20;color:${hb.color};border:1px solid ${hb.color}40">${hb.emoji} ${esc(hb.name)}</div>`).join('')}
</div>
</div>`;
}
h+=`</div>`;return h;
}

/* YEAR */
function renderYear(){
const y=currentDate.getFullYear();
let h=`<div class="year-grid">`;
for(let m=0;m<12;m++){
h+=`<div class="year-month-card">
<div class="year-month-title">${MONTHS[m]}</div>
<div class="mini-month-grid">
${DOW.map(d=>`<div class="mini-dow">${d[0]}</div>`).join('')}
${renderMiniMonth(y,m)}
</div>
</div>`;
}
h+=`</div>`;return h;
}

function renderMiniMonth(y,m){
const first=new Date(y,m,1),last=new Date(y,m+1,0);
const sdow=(first.getDay()+6)%7;
let h='';
for(let i=0;i<sdow;i++)h+=`<div class="mini-day empty"></div>`;
for(let d=1;d<=last.getDate();d++){
const dt=new Date(y,m,d);const key=dkd(dt);
const done=filtDone(key);const isT=isToday(dt);
let cls='mini-day';
if(isT)cls+=' today-mini';
if(done.length)cls+=' has-habits';
const title=done.length?`${d}: ${done.map(hb=>hb.emoji+hb.name).join(', ')}`:String(d);
const inner=done.length
?`<span class="mini-day-num">${d}</span><div class="mini-emojis">${done.map(hb=>`<span class="mini-emoji">${hb.emoji}</span>`).join('')}</div>`
:d;
h+=`<div class="${cls}" data-day="${dt.getTime()}" title="${esc(title)}">${inner}</div>`;
}
return h;
}

function attachCalEvents(){
document.querySelectorAll('[data-day]').forEach(el=>{
el.addEventListener('click',e=>{e.stopPropagation();openDayModal(new Date(parseInt(el.dataset.day)))});
});
}

/* ============================================================
STATS CONTENT (shared between panel and screen)
============================================================ */
function buildStatsHTML(){
if(!state.habits.length)return`<div class="empty-state">
<div class="empty-state-icon">📊</div>
<div class="empty-state-title">Нет данных</div>
<div class="empty-state-desc">Добавьте привычки, чтобы видеть статистику</div>
</div>`;

const period=currentView==='year'?'year':currentView==='week'?'week':'month';
const pLabel=period==='week'?'неделю':period==='month'?'месяц':'год';
let h='';

/* per-habit progress */
h+=`<div class="stat-card"><div class="stat-card-title">✅ За ${pLabel}</div>`;
state.habits.forEach(hb=>{
const done=periodStats(hb.id,period,currentDate);
const goal=goalForPeriod(hb,period);
const pct=goal?Math.min(100,Math.round(done/goal*100)):null;
let fc=pct!==null?(pct<50?'r':pct<80?'y':'g'):'g';
const streak=calcStreak(hb.id);
h+=`<div class="stat-habit-item">
<div class="stat-habit-top">
<div class="stat-habit-name">
<div style="width:22px;height:22px;border-radius:6px;background:${hb.color}33;display:flex;align-items:center;justify-content:center;font-size:.8rem">${hb.emoji}</div>
${esc(hb.name)}
</div>
<div style="display:flex;align-items:center;gap:5px">
${streak.current>=2?`<span class="streak-badge">🔥${streak.current}</span>`:''}
<span class="stat-habit-count">${done}${goal?'/'+goal:''}</span>
</div>
</div>
${goal?`<div class="pb-wrap"><div class="pb-fill ${fc}" style="width:${pct}%"></div></div><div class="stat-pct">${pct}%</div>`:''}
</div>`;
});
h+=`</div>`;

/* streaks */
h+=`<div class="stat-card"><div class="stat-card-title">🔥 Стрики</div>`;
state.habits.forEach(hb=>{
const s=calcStreak(hb.id);
h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
<div style="display:flex;align-items:center;gap:6px;font-size:.81rem">${hb.emoji} ${esc(hb.name)}</div>
<div style="display:flex;gap:8px;font-size:.75rem">
<span title="Текущая серия">🔥 ${s.current}</span>
<span title="Максимальная серия" style="color:var(--yellow)">⭐ ${s.max}</span>
</div>
</div>`;
});
h+=`<div class="streak-legend">
<strong>🔥 Текущая серия</strong> — сколько дней подряд вы выполняете привычку прямо сейчас.<br>
<strong>⭐ Максимальная серия</strong> — самая длинная непрерывная серия за всё время.
</div></div>`;

/* heatmap */
h+=`<div class="stat-card">
<div class="stat-card-title">🗓 Тепловая карта ${currentDate.getFullYear()}</div>
<div class="heatmap-wrap">${buildHeatmap()}</div>
<div style="display:flex;align-items:center;gap:4px;margin-top:8px;font-size:.65rem;color:var(--text3)">
Меньше
<div style="display:flex;gap:2px">
${['','lv1','lv2','lv3','lv4'].map(l=>`<div class="hm-cell ${l}" style="position:static"></div>`).join('')}
</div>
Больше
</div>
</div>`;

return h;
}

function buildHeatmap(){
const y=currentDate.getFullYear();
const total=state.habits.length;
if(!total)return`<div style="color:var(--text3);font-size:.75rem">Нет привычек</div>`;
const start=new Date(y,0,1);
const sdow=(start.getDay()+6)%7;
const grid=[];let col=[];
for(let i=0;i<sdow;i++)col.push(null);
const end=new Date(y,11,31);
for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
const key=dkd(d);const done=dayDone(key).length;
col.push({done,total});
if(col.length===7){grid.push(col);col=[];}
}
if(col.length){while(col.length<7)col.push(null);grid.push(col);}
let h=`<div class="heatmap-grid">`;
for(const wk of grid){
h+=`<div class="heatmap-col">`;
for(const c of wk){
if(!c){h+=`<div class="hm-cell"></div>`;continue}
let lv=0;
if(c.done>0){const r=c.done/c.total;lv=r<=.25?1:r<=.5?2:r<1?3:4}
h+=`<div class="hm-cell${lv?' lv'+lv:''}" title="${c.done}/${c.total}"></div>`;
}
h+=`</div>`;
}
h+=`</div>`;return h;
}

function renderStatsPanel(){
document.getElementById('statsPanelBody').innerHTML=buildStatsHTML();
}

/* ============================================================
MOBILE STATS SCREEN
============================================================ */
function openStatsScreen(){
document.getElementById('statsScreenBody').innerHTML=buildStatsHTML();
document.getElementById('stats-screen').classList.add('open');
}
function closeStatsScreen(){
document.getElementById('stats-screen').classList.remove('open');
}

/* ============================================================
DAY MODAL
============================================================ */
function openDayModal(date){
const key=dkd(date);
const dateStr=`${date.getDate()} ${MGEN[date.getMonth()]} ${date.getFullYear()}`;

const mkList=()=>state.habits.map(hb=>{
const done=getDone(hb.id,key);
return`<div class="day-toggle ${done?'checked':''}" data-hid="${hb.id}">
<div class="tog-emoji" style="background:${hb.color}22">${hb.emoji}</div>
<div class="tog-name">${esc(hb.name)}</div>
<div class="tog-check">${done?'✓':''}</div>
</div>`;
}).join('');

const content=`
<div class="modal-title">📅 ${dateStr}</div>
${!state.habits.length
?`<div class="empty-state"><div class="empty-state-icon">🌱</div><div class="empty-state-title">Нет привычек</div><div class="empty-state-desc">Сначала добавьте привычки</div></div>`
:`<div class="day-habit-list" id="dayList">${mkList()}</div>`}
<div class="modal-actions" id="dayActions">
${dayDone(key).length?`<button class="btn btn-secondary btn-sm" id="clearDayBtn">Очистить день</button>`:''}
<button class="btn btn-primary btn-sm" onclick="closeModal()">Готово</button>
</div>`;

openModal(content);
attachDayToggles(key,mkList);
const cb=document.getElementById('clearDayBtn');
if(cb)cb.addEventListener('click',()=>clearDay(key,mkList));
}

function attachDayToggles(key,mkList){
document.querySelectorAll('.day-toggle').forEach(el=>{
el.addEventListener('click',function h(){
el.removeEventListener('click',h);
toggleDone(el.dataset.hid,key);
const l=document.getElementById('dayList');if(l)l.innerHTML=mkList();
attachDayToggles(key,mkList);
updClearBtn(key,mkList);
renderCalendar();renderStatsPanel();renderQS();
});
});
}

function clearDay(key,mkList){
delete state.completions[key];saveState();
const l=document.getElementById('dayList');if(l)l.innerHTML=mkList();
attachDayToggles(key,mkList);
updClearBtn(key,mkList);
renderCalendar();renderStatsPanel();renderQS();
showToast('День очищен','info');
}

function updClearBtn(key,mkList){
const ma=document.getElementById('dayActions');if(!ma)return;
const ex=document.getElementById('clearDayBtn');
const has=dayDone(key).length>0;
if(has&&!ex){
const b=document.createElement('button');b.className='btn btn-secondary btn-sm';
b.id='clearDayBtn';b.textContent='Очистить день';
ma.insertBefore(b,ma.firstChild);
b.addEventListener('click',()=>clearDay(key,mkList));
}else if(!has&&ex)ex.remove();
}

/* ============================================================
HABIT MODAL
============================================================ */
let editId=null,selEmoji='🏃',selColor=COLORS[0];

function openHabitModal(hid=null){
editId=hid;
const h=hid?state.habits.find(x=>x.id===hid):null;
selEmoji=h?h.emoji:'🏃';selColor=h?h.color:COLORS[0];
const gt=h&&h.goal?h.goal.type:'week';
const gv=h&&h.goal?h.goal.value:'';

openModal(`
<div class="modal-title">${h?'✏️ Редактировать':'➕ Новая привычка'}</div>
<div class="form-group">
<label class="form-label">Название</label>
<input class="form-input" id="hName" placeholder="Например: Утробежка" maxlength="40" value="${h?esc(h.name):''}">
</div>
<div class="form-group">
<label class="form-label">Эмодзи</label>
<div class="emoji-picker-row">
<div class="emoji-preview" id="ePrev">${selEmoji}</div>
<div class="emoji-grid" id="eGrid">
${EMOJIS.map(e=>`<button class="emoji-option ${e===selEmoji?'selected':''}" data-e="${e}">${e}</button>`).join('')}
</div>
</div>
</div>
<div class="form-group">
<label class="form-label">Цвет</label>
<div class="color-row">
${COLORS.map(c=>`<div class="color-option ${c===selColor?'selected':''}" data-c="${c}" style="background:${c}"></div>`).join('')}
</div>
</div>
<div class="form-group">
<label class="form-label">Цель (необязательно)</label>
<div class="goal-inline">
<input class="form-input" id="gVal" type="number" min="1" max="365" placeholder="—" value="${gv}">
<span style="color:var(--text2);font-size:.81rem">раз в</span>
<select class="form-select" id="gType">
<option value="week" ${gt==='week'?'selected':''}>Неделю</option>
<option value="month" ${gt==='month'?'selected':''}>Месяц</option>
<option value="year" ${gt==='year'?'selected':''}>Год</option>
</select>
</div>
</div>
<div class="modal-actions">
${h?`<button class="btn btn-danger btn-sm" id="delHabitBtn">Удалить</button>`:''}
<button class="btn btn-ghost btn-sm" onclick="closeModal()">Отмена</button>
<button class="btn btn-primary btn-sm" id="saveHabitBtn">${h?'Сохранить':'Создать'}</button>
</div>`);

document.querySelectorAll('.emoji-option').forEach(b=>{
b.addEventListener('click',()=>{
selEmoji=b.dataset.e;
document.getElementById('ePrev').textContent=selEmoji;
document.querySelectorAll('.emoji-option').forEach(x=>x.classList.remove('selected'));
b.classList.add('selected');
});
});
document.querySelectorAll('.color-option').forEach(el=>{
el.addEventListener('click',()=>{
selColor=el.dataset.c;
document.querySelectorAll('.color-option').forEach(x=>x.classList.remove('selected'));
el.classList.add('selected');
});
});
document.getElementById('saveHabitBtn').addEventListener('click',saveHabit);
document.getElementById('hName').addEventListener('keydown',e=>{if(e.key==='Enter')saveHabit()});
if(h){
document.getElementById('delHabitBtn').addEventListener('click',()=>{
openConfirm('Удалить привычку?',`Привычка «${esc(h.name)}» и вся история будут удалены.`,()=>deleteHabit(h.id));
});
}
}

function saveHabit(){
const name=document.getElementById('hName').value.trim();
if(!name){showToast('Введите название','error');return}
const gv=parseInt(document.getElementById('gVal').value);
const gt=document.getElementById('gType').value;
const goal=gv>0?{type:gt,value:gv}:null;
if(editId){
const h=state.habits.find(x=>x.id===editId);
if(h)Object.assign(h,{name,emoji:selEmoji,color:selColor,goal});
showToast('Привычка обновлена','success');
}else{
state.habits.push({id:'h_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),name,emoji:selEmoji,color:selColor,goal,createdAt:Date.now()});
showToast('Привычка добавлена 🎉','success');
}
saveState();closeModal();render();
}

function deleteHabit(id){
state.habits=state.habits.filter(h=>h.id!==id);
Object.keys(state.completions).forEach(k=>{
delete state.completions[k][id];
if(!Object.keys(state.completions[k]).length)delete state.completions[k];
});
if(activeFilters)activeFilters.delete(id);
saveState();closeModal();render();
showToast('Привычка удалена','info');
}

/* ============================================================
CONFIRM MODAL
============================================================ */
function openConfirm(title,text,onOk){
openModal(`
<div class="modal-title">⚠️ ${title}</div>
<p class="confirm-text">${text}</p>
<div class="modal-actions">
<button class="btn btn-ghost btn-sm" onclick="closeModal()">Отмена</button>
<button class="btn btn-danger btn-sm" id="confOk">Подтвердить</button>
</div>`);
document.getElementById('confOk').addEventListener('click',()=>{closeModal();onOk()});
}

/* ============================================================
MODAL HELPERS
============================================================ */
function openModal(html){
document.getElementById('modalBox').innerHTML=html;
document.getElementById('modalOverlay').classList.add('open');
setTimeout(()=>{const i=document.querySelector('#modalBox input');if(i)i.focus()},120);
}
function closeModal(){
document.getElementById('modalOverlay').classList.remove('open');
render();
}

/* ============================================================
NAVIGATION
============================================================ */
function navigate(dir){
if(currentView==='month')currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+dir,1);
else if(currentView==='week')currentDate.setDate(currentDate.getDate()+dir*7);
else currentDate=new Date(currentDate.getFullYear()+dir,0,1);
render();
}

/* ============================================================
TOAST
============================================================ */
function showToast(msg,type='info'){
const tc=document.getElementById('toast-wrap');
const t=document.createElement('div');
t.className=`toast ${type}`;
const icon=type==='success'?'✅':type==='error'?'❌':'ℹ️';
t.innerHTML=`<span>${icon}</span><span>${msg}</span>`;
tc.appendChild(t);
setTimeout(()=>{t.style.animation='tOut .22s ease forwards';setTimeout(()=>t.remove(),250)},2800);
}

/* ============================================================
VIEW SYNC — keep both switchers in sync
============================================================ */
function setView(v){
currentView=v;
['vswDesktop','vswMobile'].forEach(id=>{
const sw=document.getElementById(id);if(!sw)return;
sw.querySelectorAll('.tab-btn').forEach(b=>{
b.classList.toggle('active',b.dataset.view===v);
});
});
render();
}

document.getElementById('vswDesktop').addEventListener('click',e=>{
const b=e.target.closest('.tab-btn');if(b)setView(b.dataset.view);
});
document.getElementById('vswMobile').addEventListener('click',e=>{
const b=e.target.closest('.tab-btn');if(b)setView(b.dataset.view);
});

/* ============================================================
GLOBAL EVENTS
============================================================ */
document.getElementById('prevBtn').addEventListener('click',()=>navigate(-1));
document.getElementById('nextBtn').addEventListener('click',()=>navigate(1));
document.getElementById('todayBtn').addEventListener('click',()=>{currentDate=new Date();render()});

document.getElementById('addHabitBtn').addEventListener('click',()=>openHabitModal());

document.getElementById('habitsList').addEventListener('click',e=>{
const btn=e.target.closest('[data-action]');if(!btn)return;e.stopPropagation();
const id=btn.dataset.id;const h=state.habits.find(x=>x.id===id);if(!h)return;
if(btn.dataset.action==='edit')openHabitModal(id);
if(btn.dataset.action==='delete')openConfirm('Удалить привычку?',`Привычка «${esc(h.name)}» и вся история будут удалены.`,()=>deleteHabit(id));
});

document.getElementById('filterChips').addEventListener('click',e=>{
const chip=e.target.closest('.filter-chip');if(!chip)return;
const fid=chip.dataset.fid;
if(!activeFilters){activeFilters=new Set(state.habits.map(h=>h.id));activeFilters.delete(fid)}
else if(activeFilters.has(fid)){activeFilters.delete(fid);if(!activeFilters.size)activeFilters=null}
else{activeFilters.add(fid);if(activeFilters.size===state.habits.length)activeFilters=null}
render();
});

document.getElementById('filterAllBtn').addEventListener('click',()=>{activeFilters=null;render()});

document.getElementById('clearDataBtn').addEventListener('click',()=>{
openConfirm('Очистить все данные?','Все привычки и история выполнения будут удалены с вашего устройства. Это действие нельзя отменить.',()=>{
localStorage.removeItem(SK);
state={habits:[],completions:{},createdAt:Date.now()};
activeFilters=null;render();
showToast('Данные очищены','info');
});
});

/* Mobile stats screen */
document.getElementById('mobileStatsBtn').addEventListener('click',openStatsScreen);
document.getElementById('statsBackBtn').addEventListener('click',closeStatsScreen);

/* Modal overlay close */
document.getElementById('modalOverlay').addEventListener('click',e=>{
if(e.target===document.getElementById('modalOverlay'))closeModal();
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

/* Mobile sidebar */
const sidebar=document.getElementById('sidebar');
const sbBackdrop=document.getElementById('sbBackdrop');
document.getElementById('menuToggle').addEventListener('click',()=>{
sidebar.classList.toggle('open');
sbBackdrop.style.display=sidebar.classList.contains('open')?'block':'none';
});
sbBackdrop.addEventListener('click',()=>{
sidebar.classList.remove('open');
sbBackdrop.style.display='none';
});

/* ============================================================
INIT
============================================================ */
render();
</script>
</body>
</html>
